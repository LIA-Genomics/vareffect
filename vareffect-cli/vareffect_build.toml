# vareffect-cli build configuration.
#
# This file configures `vareffect setup` -- the one-command provisioner
# for all vareffect runtime data. It can also be pointed at via
# `--config` when running individual subcommands.
#
# Two assemblies are supported in parallel sub-tables: `[vareffect.grch38]`
# and `[vareffect.grch37]`. The CLI's `--assembly` flag picks which to
# build; both can co-exist on disk and be loaded into a single VarEffect
# at runtime via `VarEffect::builder().with_grch38(...).with_grch37(...)`.
#
# The parser silently ignores unknown top-level sections, so this file
# can be shared with other build tools that add their own sections
# without requiring changes here.

[paths]
raw_dir = "data/raw"

# Optional [mane] section. When present, the `input` field overrides the
# default GFF3 cache filename so a downstream pipeline can pre-stage the
# MANE GFF3 and have `vareffect setup` reuse it instead of re-downloading.
[mane]
input = "mane_grch38.gff.gz"

# Shared output directory for all per-assembly artifacts (.bin, .bin.idx,
# transcript_models_grch{37,38}.bin, patch_chrom_aliases_grch{37,38}.csv).
[vareffect]
output_dir = "data/vareffect"

# --- GRCh38 build ----------------------------------------------------------
#
# Source: NCBI RefSeq GRCh38.p14 + MANE v1.5. Includes every `NC_*` primary
# chromosome plus all `NW_*`/`NT_*` patch scaffolds. Contig naming aligns
# with the MANE GFF3 column 1, so patch transcripts in
# `transcript_models_grch38.bin` resolve directly against the genome.
#
# `transcript_source = "mane"` admits `tag=MANE Select` and
# `tag=MANE Plus Clinical`. `cross_validation_url` points at NCBI's MANE
# summary TSV so the GFF3 build is cross-checked against an authoritative
# second source; mismatches fail the build.
[vareffect.grch38]
fasta_url      = "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.40_GRCh38.p14/GCF_000001405.40_GRCh38.p14_genomic.fna.gz"
fasta_filename = "GRCh38.bin"
fasta_build    = "GRCh38"
gff_url                       = "https://ftp.ncbi.nlm.nih.gov/refseq/MANE/MANE_human/release_1.5/MANE.GRCh38.v1.5.refseq_genomic.gff.gz"
cross_validation_url          = "https://ftp.ncbi.nlm.nih.gov/refseq/MANE/MANE_human/release_1.5/MANE.GRCh38.v1.5.summary.txt.gz"
cross_validation_input        = "mane_transcript_models_v1.5.summary.tsv.gz"
transcript_models_filename    = "transcript_models_grch38.bin"
transcript_models_basename    = "transcript_models_grch38"
transcript_models_version     = "1.5"
transcript_source             = "mane"
assembly_report_url           = "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.40_GRCh38.p14/GCF_000001405.40_GRCh38.p14_assembly_report.txt"
assembly_report_input         = "GCF_000001405.40_GRCh38.p14_assembly_report.txt"
patch_aliases_filename        = "patch_chrom_aliases_grch38.csv"

# --- GRCh37 build ----------------------------------------------------------
#
# Source: NCBI RefSeq GRCh37.p13 (`GCF_000001405.25-RS_2024_09`). MANE is
# GRCh38-only, so GRCh37 transcripts come from NCBI's RefSeq Select set
# instead — the GFF3 carries `tag=RefSeq Select` on the curated
# representative transcripts.
#
# `cross_validation_url` is intentionally omitted for Stage A: NCBI's
# GRCh37 publication has no MANE-summary equivalent, and UCSC's
# `ncbiRefSeq.txt` is not authoritative for RefSeq Select status (Select
# flags live in the sibling `ncbiRefSeqSelect.txt`). Stage B will add a
# proper second-source check; until then the build emits an explicit
# `tracing::warn!` flagging the missing quality gate.
[vareffect.grch37]
fasta_url      = "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.25_GRCh37.p13/GCF_000001405.25_GRCh37.p13_genomic.fna.gz"
fasta_filename = "GRCh37.bin"
fasta_build    = "GRCh37"
gff_url                       = "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.25_GRCh37.p13/GCF_000001405.25_GRCh37.p13_genomic.gff.gz"
transcript_models_filename    = "transcript_models_grch37.bin"
transcript_models_basename    = "transcript_models_grch37"
transcript_models_version     = "GRCh37.p13"
transcript_source             = "refseq_select"
assembly_report_url           = "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.25_GRCh37.p13/GCF_000001405.25_GRCh37.p13_assembly_report.txt"
assembly_report_input         = "GCF_000001405.25_GRCh37.p13_assembly_report.txt"
patch_aliases_filename        = "patch_chrom_aliases_grch37.csv"
