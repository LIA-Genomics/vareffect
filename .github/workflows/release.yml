# .github/workflows/release.yml
name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # ── Library crate first (CLI depends on it) ──
  publish-lib:
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish vareffect lib
        run: |
          cargo publish -p vareffect || {
            echo "::warning::Publish failed — version may already exist on crates.io"
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── CLI crate after lib is indexed ──
  publish-cli:
    needs: publish-lib
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish CLI (retry until lib is indexed)
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: publishing vareffect-cli..."
            if cargo publish -p vareffect-cli; then
              echo "Published successfully on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed, waiting 30s..."
            sleep 30
          done
          echo "::warning::All 5 attempts failed — version may already exist on crates.io"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── Prebuilt binaries for users without Rust ──
  build-binaries:
    needs: publish-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build -p vareffect-cli --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p vareffect-cli --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz vareffect
          cd ../../..
          sha256sum vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz \
            > vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip vareffect.exe
          cd ../../..
          (Get-FileHash "vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip" | Out-File -Encoding ascii "vareffect-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip.sha256"

      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ env.RELEASE_TAG }} || true
          git push origin ${{ env.RELEASE_TAG }} || true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            vareffect-*.tar.gz
            vareffect-*.tar.gz.sha256
            vareffect-*.zip
            vareffect-*.zip.sha256